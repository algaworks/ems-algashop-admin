<section class="public-home">
  <div class="public-home__glow public-home__glow--one"></div>
  <div class="public-home__glow public-home__glow--two"></div>

  <div class="public-home__card">
    <div class="public-home__brand">
      <img src="assets/images/logo.png" alt="AlgaShop">
    </div>

    <p class="public-home__eyebrow">Admin panel</p>
    <p class="public-home__description">
      Access the admin with your OAuth2 account and go directly to the dashboard to continue the work.
    </p>

    <button type="button" class="public-home__button" (click)="login()">
      Sign in
    </button>
  </div>
</section>
