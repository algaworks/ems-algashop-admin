<div class="p-grid">
    <div class="p-col-12">
        <div class="aw-page-title">
            <h1 class="aw-card-title">Orders</h1>
        </div>
        <div class="aw-page-options">
            <!--filter-->
            <app-order-filter (doFilter)="doSearch($event)"
                              [appliedFilter]="filter"/>
        </div>

        <p-table [value]="orders!"
                styleClass="p-datatable-sm p-card"
                [lazyLoadOnInit]="false"
                [resizableColumns]="true"
                columnResizeMode="expand"
                [lazy]="true"
                (onLazyLoad)="onPageChange($event)"
                [paginator]="true"
                [rows]="recordsPerPage"
                [totalRecords]="totalElements"
                [loading]="loading">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">Code<p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="shipping.fullName">Customer<p-sortIcon field="shipping.fullName"></p-sortIcon></th>
                    <th pSortableColumn="totalItems">Total items<p-sortIcon field="totalItems"></p-sortIcon></th>
                    <th pSortableColumn="totalAmount">Total Amount<p-sortIcon field="totalAmount"></p-sortIcon></th>
                    <th pSortableColumn="status">Status<p-sortIcon field="status"></p-sortIcon></th>
                    <th pSortableColumn="placedAt">Ordered at<p-sortIcon field="placedAt"></p-sortIcon></th>
                    <th pSortableColumn="paidAt">Paid at<p-sortIcon field="paidAt"></p-sortIcon></th>
                    <th pSortableColumn="canceledAt">Canceled at<p-sortIcon field="canceledAt"></p-sortIcon></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-order>
                <tr>
                    <td>
                      <a routerLink="/orders/{{order.id}}"
                          class="aw-table-link">
                          {{order.id}}
                      </a>
                    </td>
                    <td>
                        {{order.customerName}}
                    </td>
                    <td>
                        {{order.totalItems}}
                    </td>
                    <td>
                        {{order.totalAmount}}
                    </td>
                    <td>
                      <app-order-status-badge [status]="order.status"/>
                    </td>
                     <td>
                        {{order.placedAt | date}}
                    </td>
                     <td>
                        {{order.paidAt | date}}
                    </td>
                     <td>
                        {{order.canceledAt | date}}
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage" let-columns>
                <tr>
                    <td [attr.colspan]="8" style="text-align: center; padding: 1em;">
                      No results were found for this search.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
