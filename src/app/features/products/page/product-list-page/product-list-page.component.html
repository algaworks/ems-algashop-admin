<div class="p-grid">
    <div class="p-col-12">
        <div class="aw-page-title">
            <h1 class="aw-card-title">Products</h1>
            <button routerLink="/products/new"
                pButton
                pRipple
                type="button"
                label="New"
                class="p-button-primary p-button-outlined">
            </button>
        </div>
        <div class="aw-page-options">
            <!--filter-->
            <app-product-filter (doFilter)="doSearch($event)"
                                [appliedFilter]="filter" />
        </div>

        <p-table [value]="products!"
                styleClass="p-datatable-sm p-card"
                [lazyLoadOnInit]="false"
                [resizableColumns]="true"
                columnResizeMode="expand"
                [lazy]="true"
                (onLazyLoad)="onPageChange($event)"
                [paginator]="true"
                [rows]="recordsPerPage"
                [totalRecords]="totalElements"
                [loading]="loading">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">Code<p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="name">Name<p-sortIcon field="name"></p-sortIcon></th>
                    <th pSortableColumn="category.name">Category<p-sortIcon field="category.name"></p-sortIcon></th>
                    <th pSortableColumn="brand">Brand<p-sortIcon field="brand"></p-sortIcon></th>
                    <th pSortableColumn="hasDiscount">On sale<p-sortIcon field="hasDiscount"></p-sortIcon></th>
                    <th pSortableColumn="discountPercentageRounded">Discount percentage<p-sortIcon field="discountPercentageRounded"></p-sortIcon></th>
                    <th pSortableColumn="enabled">Status<p-sortIcon field="enabled"></p-sortIcon></th>
                    <th pSortableColumn="inventoryStatus">In stock<p-sortIcon field="inventoryStatus"></p-sortIcon></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-product>
                <tr>
                    <td>
                        {{product.id}}
                    </td>
                    <td>
                        <a routerLink="/products/{{product.id}}"
                            class="aw-table-link">
                            {{product.name}}
                        </a>
                    </td>
                    <td>
                        {{product.category.name}}
                    </td>
                    <td>
                        {{product.brand}}
                    </td>
                    <td>
                        {{product.hasDiscount ? 'Yes' : 'No'}}
                    </td>
                    <td>
                        {{product.discountPercentageRounded}}%
                    </td>
                    <td>
                        <app-product-status-badge [enabled]="product.enabled"/>
                    </td>
                    <td>
                        <app-product-inventory-status-badge [inventoryStatus]="product.inStock"/>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage" let-columns>
                <tr>
                    <td [attr.colspan]="9" style="text-align: center; padding: 1em;">
                      No results were found for this search.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
