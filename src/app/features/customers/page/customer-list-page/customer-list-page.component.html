<div class="p-grid">
    <div class="p-col-12">
        <div class="aw-page-title">
            <h1 class="aw-card-title">Customers</h1>
        </div>
        <div class="aw-page-options">
            <!--filter-->
            <app-customer-filter (doFilter)="doSearch($event)"
                             [appliedFilter]="filter"/>
        </div>

        <p-table [value]="customers!"
                styleClass="p-datatable-sm p-card"
                [lazyLoadOnInit]="false"
                [resizableColumns]="true"
                columnResizeMode="expand"
                [lazy]="true"
                (onLazyLoad)="onPageChange($event)"
                [paginator]="true"
                [rows]="recordsPerPage"
                [totalRecords]="totalElements"
                [loading]="loading">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="firstName">Name<p-sortIcon field="firstName"></p-sortIcon></th>
                    <th pSortableColumn="email">Email<p-sortIcon field="email"></p-sortIcon></th>
                    <th>Phone<p-sortIcon field="phone"></p-sortIcon></th>
                    <th pSortableColumn="birthDate">Born on<p-sortIcon field="birthDate"></p-sortIcon></th>
                    <th>Document<p-sortIcon field="document"></p-sortIcon></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-customer>
                <tr>
                    <td>
                        <a routerLink="/customers/{{customer.id}}"
                            class="aw-table-link">
                            {{customer.firstName}} {{customer.lastName}}
                        </a>
                    </td>
                    <td>
                        {{customer.email}}
                    </td>
                    <td>
                        {{customer.phone}}
                    </td>
                     <td>
                        {{customer.birthDate | date}}
                    </td>
                     <td>
                        {{customer.document}}
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage" let-columns>
                <tr>
                    <td [attr.colspan]="5" style="text-align: center; padding: 1em;">
                      No results were found for this search.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
